services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    env_file:
      - ./frontend/.env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "benchy-frontend"
    restart: unless-stopped
